name: kwanix-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_connections=100
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    mem_limit: 160m
    restart: always

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ARKESEL_API_KEY: ${ARKESEL_API_KEY}
      ARKESEL_SENDER_ID: ${ARKESEL_SENDER_ID:-Kwanix}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://kwanix.com}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://api.kwanix.com}
      MANIFEST_EMAIL: ${MANIFEST_EMAIL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      APP_ROLE_PASSWORD: ${APP_ROLE_PASSWORD}
    ports:
      - "127.0.0.1:8100:8000"
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=200"
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    ports:
      - "127.0.0.1:3100:3000"
    mem_limit: 256m
    depends_on:
      - api
    restart: always

volumes:
  postgres_data_prod:
  redis_data_prod:
