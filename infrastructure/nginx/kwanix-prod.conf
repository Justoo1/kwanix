# ── Kwanix nginx — PRODUCTION (host nginx, not containerized) ───────────────
# Install: sudo cp this file /etc/nginx/sites-available/kwanix-prod.conf
#          sudo ln -s /etc/nginx/sites-available/kwanix-prod.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name app.kwanix.com api.kwanix.com;
    return 301 https://$host$request_uri;
}

# ── Web (Next.js) — production ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.kwanix.com;

    ssl_certificate     /etc/ssl/kwanix/origin.crt;
    ssl_certificate_key /etc/ssl/kwanix/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header X-XSS-Protection          "1; mode=block"                       always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_min_length 256;

    # Next.js static assets — permanent cache (content-hashed by Next.js)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Public files — short cache
    location /public/ {
        proxy_pass http://127.0.0.1:3100;
        add_header Cache-Control "public, max-age=86400";
    }

    # All other requests → Next.js server
    location / {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    on;
    }
}

# ── API (FastAPI) — production ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.kwanix.com;

    ssl_certificate     /etc/ssl/kwanix/origin.crt;
    ssl_certificate_key /etc/ssl/kwanix/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;

    # Swagger/ReDoc disabled in production (DEBUG=false in the API container)
    location ~ ^/(docs|redoc|openapi.json) {
        return 404;
    }

    # Paystack webhooks — bypass 1 MB body limit
    location /api/v1/webhooks/ {
        proxy_pass         http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # $remote_addr prevents clients spoofing X-Forwarded-For to bypass rate limits
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 0;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass         http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 1m;
    }
}
