# ── RoutePass nginx — STAGING ──────────────────────────────────────────────────
# HTTP → HTTPS redirect
server {
    listen 80;
    server_name staging.routepass.com api.staging.routepass.com;
    return 301 https://$host$request_uri;
}

# ── Web (Next.js) ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name staging.routepass.com;

    ssl_certificate     /etc/nginx/certs/staging.crt;
    ssl_certificate_key /etc/nginx/certs/staging.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"           always;
    add_header X-Content-Type-Options   "nosniff"              always;
    add_header Referrer-Policy          "strict-origin"        always;
    add_header X-XSS-Protection         "1; mode=block"        always;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public static files
    location /public/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=3600";
    }

    # All other requests → Next.js server
    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── API (FastAPI) ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name api.staging.routepass.com;

    ssl_certificate     /etc/nginx/certs/staging.crt;
    ssl_certificate_key /etc/nginx/certs/staging.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options        "DENY"        always;
    add_header X-Content-Type-Options "nosniff"     always;

    # Block direct browser access to API docs in staging if needed
    # location ~ ^/(docs|redoc) { return 403; }

    # Paystack webhook — no body size limit
    location /api/v1/webhooks/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 0;
    }

    location / {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 1m;
    }
}
