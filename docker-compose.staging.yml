name: kwanix-staging

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Keep Postgres lean — it defaults to 25% of system RAM for shared_buffers
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_staging:/data
    mem_limit: 96m
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.staging
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ARKESEL_API_KEY: ${ARKESEL_API_KEY}
      ARKESEL_SENDER_ID: ${ARKESEL_SENDER_ID:-Kwanix}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-staging}
      DEBUG: ${DEBUG:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.2}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://staging.kwanix.com}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://staging-api.kwanix.com}
      MANIFEST_EMAIL: ${MANIFEST_EMAIL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    ports:
      - "127.0.0.1:8101:8000"
    mem_limit: 256m
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      # Cap Node.js heap so it doesn't grow unboundedly
      NODE_OPTIONS: "--max-old-space-size=200"
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    ports:
      - "127.0.0.1:3101:3000"
    mem_limit: 256m
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data_staging:
  redis_data_staging:
