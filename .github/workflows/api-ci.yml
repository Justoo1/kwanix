name: API CI

on:
  push:
    paths:
      - "apps/api/**"
  pull_request:
    paths:
      - "apps/api/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kwanix
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: kwanix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://kwanix:secret@localhost:5432/kwanix_test
      JWT_SECRET_KEY: test-secret-key-for-ci-only-not-a-real-secret
      APP_ROLE_PASSWORD: ci-app-role-password
      ARKESEL_API_KEY: ""

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type check (mypy)
        run: mypy app || true  # non-blocking — pre-existing errors, fix incrementally

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing
