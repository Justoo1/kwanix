name: Web CI

on:
  push:
    paths:
      - "apps/web/**"
  pull_request:
    paths:
      - "apps/web/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create dev env for CI
        working-directory: .
        run: |
          cat > .env.dev << 'EOF'
          POSTGRES_USER=kwanix
          POSTGRES_PASSWORD=secret
          POSTGRES_DB=kwanix_db
          DATABASE_URL=postgresql+asyncpg://kwanix_app:secret_app@postgres:5432/kwanix_db
          DATABASE_ADMIN_URL=postgresql+asyncpg://kwanix:secret@postgres:5432/kwanix_db
          APP_ROLE_PASSWORD=secret_app
          JWT_SECRET_KEY=ci-test-secret-key-not-used-in-production
          REDIS_PASSWORD=redis_secret
          SESSION_SECRET=ci-session-secret-not-used-in-production
          API_INTERNAL_URL=http://api:8000
          NEXT_PUBLIC_API_URL=http://localhost:8000
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          PUBLIC_APP_URL=http://localhost:3000
          API_PUBLIC_URL=http://localhost:8000
          ALLOWED_ORIGINS=http://localhost:3000
          ENVIRONMENT=development
          DEBUG=true
          ARKESEL_API_KEY=
          PAYSTACK_SECRET_KEY=
          PAYSTACK_PUBLIC_KEY=
          EOF

      - name: Start API (for type generation)
        working-directory: .
        run: docker compose up -d api

      - name: Wait for API health
        working-directory: .
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/15)"
            sleep 4
          done
          echo "API did not become healthy"
          docker compose logs api --tail=30
          exit 1

      - name: Generate TypeScript types from OpenAPI
        working-directory: .
        run: bash infrastructure/scripts/generate_types.sh

      - name: Fail if generated types differ from committed version
        working-directory: .
        run: git diff --exit-code apps/web/types/api.generated.ts

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXTAUTH_SECRET: test-secret
          NEXTAUTH_URL: http://localhost:3000
