<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- K — vertical stroke -->
  <rect x="42" y="39" width="20" height="102" rx="10" fill="white"/>

  <!-- K — upper arm -->
  <line x1="62" y1="87" x2="130" y2="39" stroke="white" stroke-width="18" stroke-linecap="round"/>

  <!-- K — lower arm -->
  <line x1="62" y1="87" x2="130" y2="141" stroke="white" stroke-width="18" stroke-linecap="round"/>

  <!-- Waypoint dot -->
  <circle cx="62" cy="87" r="17" fill="url(#dot)"/>
</svg>
